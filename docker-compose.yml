services:
  salume-studio:
    build: .
    image: salume-studio:latest
    container_name: salume-studio
    ports:
      # host:container — change 8080 if that port is taken on your box.
      - "8080:80"
    volumes:
      # Curing data is auto-synced here as JSON, so it lives on the host and
      # is shared across every browser/device. Make sure the host dir exists
      # and is writable by the container (chmod 777 on unraid appdata).
      - /mnt/user/appdata/salume-studio:/usr/share/nginx/html/data
    restart: unless-stopped
