server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index charcuterie.html;

    # Serve text as UTF-8 so emoji / em-dashes aren't mangled into mojibake.
    charset utf-8;

    # Basic hardening (this is a LAN app, but cheap to add).
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # Serve the single-file app at the root path.
    location / {
        try_files $uri $uri/ /charcuterie.html;
    }

    # The app shell changes whenever the image is rebuilt, so revalidate
    # rather than letting browsers pin a stale copy.
    location = /charcuterie.html {
        add_header Cache-Control "no-cache" always;
    }

    # ---- Data auto-sync (WebDAV) ----------------------------------------
    # The app GETs and PUTs its curing data as JSON here. This directory is
    # bind-mounted to /mnt/user/appdata/salume-studio on the host, so the
    # data lives on the unraid box and is shared across every browser/device.
    #
    # The temp path MUST sit on the same filesystem (the same bind mount) as
    # the destination, or nginx's atomic PUT rename fails with a cross-device
    # error. Hence client_body_temp_path points inside the data dir.
    #
    # No auth: any client on your LAN can read/overwrite this file. That's
    # fine for a single-user homelab. DELETE is intentionally not allowed.
    location = /data/curing.json {
        dav_methods PUT;
        create_full_put_path   on;
        dav_access             all:rw;
        client_body_temp_path  /usr/share/nginx/html/data/.tmp;
        client_max_body_size   16m;
        default_type           application/json;
        add_header Cache-Control "no-store" always;
    }
    # ----------------------------------------------------------------------

    # ---- MQTT-over-WebSocket reverse proxy ------------------------------
    # The NodeMCU publishes to Mosquitto over TCP (1883), which a browser
    # cannot read directly. This proxies same-origin  ws://<host>:<port>/mqtt
    # through to the broker's websockets listener, so the Chamber panel can
    # subscribe to charcuterie/# for live temp/humidity — and it works even
    # if the broker sits on a VLAN the browser can't reach directly, as long
    # as this container can.
    #
    # Requires a websockets listener on the broker (mosquitto.conf):
    #     listener 1883
    #     listener 9001
    #     protocol websockets
    # Point proxy_pass at that listener (host:9001), then rebuild the image.
    location /mqtt {
        proxy_pass         http://192.168.250.3:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # ----------------------------------------------------------------------
}
